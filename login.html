<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BPM Intelligence — 安全登入</title>
  <link rel="stylesheet" href="styles.css?v=3" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <style>
    /* ── Page-specific styling — BPM tokens only ─────────────────────────── */
    html, body {
      height: 100%;
      background: var(--paper);
    }

    /* Faint engineering-grid texture behind the card (0.5px hairlines @24px) */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(to right, var(--rule) 0.5px, transparent 0.5px),
        linear-gradient(to bottom, var(--rule) 0.5px, transparent 0.5px);
      background-size: 24px 24px;
      opacity: 0.30;
      pointer-events: none;
    }

    /* ── Layout ── */
    .login-wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ── Card — flat hairline, 0 radius, no shadow ── */
    .login-card {
      position: relative;
      background: var(--bone);
      border: 1px solid var(--rule);
      border-radius: 0;
      width: 100%;
      max-width: 420px;
    }

    /* 2px red top rule across the card top */
    .login-card-top {
      height: 2px;
      background: var(--bpm-red);
    }

    .login-card-body {
      padding: 38px 40px 34px;
    }

    /* ── Brand lockup — BPM wordmark + red triangle ── */
    .login-brand {
      margin-bottom: 22px;
    }
    .login-brand .brand {
      display: inline-flex;
      align-items: center;
      gap: 2px;
    }
    .login-brand .brand-sub {
      display: block;
      margin: 8px 0 0;
    }

    /* ── Rule ── */
    .login-rule {
      height: 1px;
      background: var(--rule);
      border: 0;
      margin-bottom: 22px;
    }

    /* ── Client context ── */
    .login-client {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.012em;
      line-height: 1.3;
      margin-bottom: 5px;
    }
    .login-scope {
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--ink-3);
      letter-spacing: 0.01em;
      margin-bottom: 30px;
    }

    /* ── Form ── */
    .login-label {
      display: block;
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 600;
      color: var(--ink-3);
      letter-spacing: var(--tr-caps);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .login-field { margin-bottom: 16px; }

    .login-input-wrap {
      position: relative;
    }

    .login-input {
      width: 100%;
      height: 44px;
      padding: 0 44px 0 14px;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 2px;
      outline: none;
      transition: border-color var(--d-component) var(--ease), box-shadow var(--d-component) var(--ease);
      letter-spacing: 0.01em;
    }

    .login-input::placeholder {
      color: var(--ink-4);
      font-family: var(--font-sans);
      letter-spacing: normal;
    }

    .login-input:focus {
      border-color: var(--ink-3);
      box-shadow: 0 0 0 3px var(--ink-08);
    }

    .login-input.shake {
      animation: shake 0.28s var(--ease);
    }

    .login-input.err {
      border-color: var(--bpm-red);
      box-shadow: 0 0 0 3px var(--bpm-red-tint);
    }

    @keyframes shake {
      0%  { transform: translateX(0); }
      18% { transform: translateX(-5px); }
      36% { transform: translateX(5px); }
      54% { transform: translateX(-4px); }
      72% { transform: translateX(4px); }
      86% { transform: translateX(-2px); }
      100%{ transform: translateX(0); }
    }

    /* Eye toggle */
    .login-eye {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-4);
      transition: color var(--d-hover) var(--ease);
      padding: 0;
    }

    .login-eye:hover { color: var(--ink-2); }
    .login-eye svg { width: 17px; height: 17px; flex-shrink: 0; }

    /* Error message */
    .login-error {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--bpm-red);
      margin-top: 8px;
      min-height: 18px;
      opacity: 0;
      transition: opacity var(--d-hover) var(--ease);
    }

    .login-error.visible { opacity: 1; }

    /* ── Button — BPM primary ── */
    .login-btn {
      width: 100%;
      height: 44px;
      margin-top: 20px;
      background: var(--bpm-red);
      color: var(--paper);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      border: 1px solid transparent;
      border-radius: 2px;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background var(--d-hover) var(--ease), transform var(--d-hover) var(--ease);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .login-btn:hover  { background: var(--bpm-red-hover); }
    .login-btn:active { background: var(--bpm-red-press); transform: translateY(0.5px); }

    .login-btn.loading {
      background: var(--bpm-red-press);
      pointer-events: none;
    }

    /* ── Footer ── */
    .login-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--rule);
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--ink-3);
      letter-spacing: 0.01em;
    }

    .login-footer svg { width: 12px; height: 12px; flex-shrink: 0; opacity: 0.8; }

    /* ── Below-card copy ── */
    .login-legal {
      margin-top: 24px;
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--ink-4);
      letter-spacing: 0.03em;
      text-align: center;
      line-height: 1.7;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .login-card-body { padding: 28px 22px 26px; }
      .login-wrap { padding: 24px 14px; }
    }
  </style>
</head>
<body>

<div class="login-wrap">

  <div class="login-card">
    <div class="login-card-top"></div>
    <div class="login-card-body">

      <!-- Brand lockup -->
      <div class="login-brand">
        <span class="brand">
          <span class="brand-mark">BPM</span><span class="brand-tri"></span>
        </span>
        <span class="brand-sub">Portfolio Intelligence</span>
      </div>

      <hr class="login-rule" />

      <!-- Client context -->
      <p class="login-client">陳氏家族信託</p>
      <p class="login-scope">資產組合管理系統 · 受限存取 · 機密文件</p>

      <!-- Email -->
      <div class="login-field">
        <label class="login-label" for="email">電子郵件 · Email</label>
        <div class="login-input-wrap">
          <input
            type="email"
            id="email"
            class="login-input"
            placeholder="you@example.com"
            autocomplete="username"
            spellcheck="false"
            autofocus
          />
        </div>
      </div>

      <!-- Password -->
      <label class="login-label" for="password">密碼 · Password</label>
      <div class="login-input-wrap">
        <input
          type="password"
          id="password"
          class="login-input"
          placeholder="輸入密碼"
          autocomplete="current-password"
          spellcheck="false"
        />
        <button class="login-eye" id="toggle-eye" type="button" aria-label="顯示密碼" tabindex="-1">
          <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <div class="login-error" id="login-error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;flex-shrink:0">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="login-error-text">登入失敗，請確認電子郵件與密碼</span>
      </div>

      <!-- CTA -->
      <button class="login-btn" id="login-btn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        進入系統
      </button>

      <!-- Footer -->
      <div class="login-footer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        受限存取系統 · 僅供授權使用者登入
      </div>

    </div>
  </div>

  <p class="login-legal">
    © 2026 BPM Capital Partners · 保密資訊，禁止轉發或重製
  </p>

</div>

<script>
  /* If already signed in, go straight to the dashboard. */
  if (window.redirectIfAuthed) window.redirectIfAuthed();

  const emailEl = document.getElementById('email');
  const pwEl    = document.getElementById('password');
  const btn     = document.getElementById('login-btn');
  const errBox  = document.getElementById('login-error');
  const errText = document.getElementById('login-error-text');
  const eyeBtn  = document.getElementById('toggle-eye');
  const eyeIcon = document.getElementById('eye-icon');
  const BTN_HTML = btn.innerHTML;

  const EYE_OPEN   = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  const EYE_CLOSED = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';

  function clearError() {
    errBox.classList.remove('visible');
    emailEl.classList.remove('err');
    pwEl.classList.remove('err');
  }
  function showError(msg) {
    errText.textContent = msg;
    errBox.classList.add('visible');
    pwEl.classList.add('err');
    pwEl.classList.remove('shake');
    void pwEl.offsetWidth; /* restart animation */
    pwEl.classList.add('shake');
  }
  function setLoading(on) {
    if (on) {
      btn.classList.add('loading');
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;animation:spin 0.7s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.08-8.2"/></svg> 驗證中…';
    } else {
      btn.classList.remove('loading');
      btn.innerHTML = BTN_HTML;
    }
  }

  async function attempt() {
    clearError();
    const email = emailEl.value.trim();
    const password = pwEl.value;
    if (!email || !password) {
      showError('請輸入電子郵件與密碼');
      return;
    }
    if (!window.sb) {
      showError('無法連線至伺服器，請稍後再試');
      return;
    }
    setLoading(true);
    try {
      const { error } = await window.sb.auth.signInWithPassword({ email, password });
      if (error) {
        setLoading(false);
        showError('登入失敗，請確認電子郵件與密碼');
        pwEl.select();
      } else {
        window.location.replace('portfolio.html');
      }
    } catch (e) {
      setLoading(false);
      showError('登入時發生錯誤，請稍後再試');
    }
  }

  btn.addEventListener('click', attempt);
  [emailEl, pwEl].forEach(elm => elm.addEventListener('keydown', e => {
    if (e.key === 'Enter') { attempt(); return; }
    clearError();
  }));

  eyeBtn.addEventListener('click', () => {
    const show = pwEl.type === 'password';
    pwEl.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show ? EYE_CLOSED : EYE_OPEN;
    pwEl.focus();
  });
</script>

</body>
</html>
