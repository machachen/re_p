<!DOCTYPE html>
<!-- @dsCard group="Slides" name="Slide · Pull quote" subtitle="Bilingual quote attributed to an analyst" viewport="1280x720" -->
<html lang="en"><head><meta charset="utf-8"><title>BPM · Quote</title><link rel="stylesheet" href="deck.css"></head>
<body>
<div class="slide" style="background:var(--bone)">
  <div class="slide-chrome-top"></div>
  <div class="slide-brand"><span class="mark">BPM</span><span class="tri"></span><span class="sub">Portfolio Intelligence</span></div>
  <div class="slide-meta-right"><span>Q2 2025 · 第二季</span><span class="dot"></span><span>14 JUL 2025</span></div>

  <div style="margin:auto 120px; max-width:1040px">
    <div style="font-family:var(--font-display); font-weight:500; font-size:120px; color:var(--bpm-red); line-height:0.8; letter-spacing:-0.04em">「</div>
    <h1 class="s-headline-tc" style="font-size:56px; line-height:1.25; font-weight:600; margin-top:-32px">
      估值不是看樓蓋得多漂亮，<br/>
      而是看下一份租約能簽到多少錢。
    </h1>
    <h2 class="s-headline" style="font-size:26px; font-weight:500; color:var(--ink-3); letter-spacing:-0.018em; line-height:1.35; margin-top:24px; font-style:italic; max-width:30em">
      "Valuation isn't about how handsome the building is. It's about what number the next lease comes in at."
    </h2>

    <hr class="s-rule" style="margin:48px 0 20px; height:2px; background:var(--ink); width:80px"/>
    <div style="display:flex; align-items:baseline; gap:14px; font-family:var(--font-sans)">
      <div>
        <div style="font-size:18px; font-weight:600; color:var(--ink)">Audrey Cheung</div>
        <div style="font-size:13px; color:var(--ink-3); font-style:italic">Director, Asia coverage · BPM</div>
      </div>
      <div style="width:1px; height:32px; background:var(--rule)"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3); letter-spacing:0.1em">Q2 2025 · NOTE TO COMMITTEE</div>
    </div>
  </div>

  <div class="slide-foot-left">BPM · Q2 2025 Review</div>
  <div class="slide-foot-right">10 / 12</div>
  <div class="slide-chrome-bottom"></div>
</div>
</body></html>
