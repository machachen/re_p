<!DOCTYPE html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary · secondary · tertiary · sizes · states" viewport="700x320" -->
<html lang="en"><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_card.css">
<style>
  .btn { font-family:var(--font-sans); font-size:14px; font-weight:500; letter-spacing:-0.005em; padding:10px 18px; border-radius:2px; border:1px solid transparent; cursor:pointer; line-height:1; transition:background var(--d-hover) var(--ease), border-color var(--d-hover) var(--ease); }
  .btn-primary { background:#8E1B1F; color:#F5F1EA; }
  .btn-primary:hover { background:#761519; }
  .btn-primary:active { background:#5E1115; transform:translateY(0.5px); }
  .btn-secondary { background:transparent; color:#0B0B0C; border-color:#0B0B0C; }
  .btn-secondary:hover { background:rgba(11,11,12,0.05); }
  .btn-tertiary { background:transparent; color:#0B0B0C; border-color:transparent; padding:10px 8px; }
  .btn-tertiary:hover { text-decoration:underline; text-underline-offset:3px; }
  .btn-disabled { background:#ECE7DD; color:#B7B6B3; border-color:#D8D5CE; cursor:not-allowed; }
  .btn-sm { font-size:12px; padding:6px 10px; }
  .btn-lg { font-size:16px; padding:14px 22px; }
</style>
</head>
<body style="padding:24px 28px">
  <div style="display:grid; grid-template-columns:auto 1fr; gap:16px 28px; align-items:center">
    <div class="tag">PRIMARY · 主要</div>
    <div style="display:flex; gap:10px; align-items:center"><button class="btn btn-primary">Open report</button><button class="btn btn-primary">申請存取</button><span class="hex">red · loss-coded · 1 per screen</span></div>

    <div class="tag">SECONDARY</div>
    <div style="display:flex; gap:10px; align-items:center"><button class="btn btn-secondary">Export PDF</button><button class="btn btn-secondary">儲存草稿</button><span class="hex">ink-bordered · neutral action</span></div>

    <div class="tag">TERTIARY</div>
    <div style="display:flex; gap:10px; align-items:center"><button class="btn btn-tertiary">Cancel</button><button class="btn btn-tertiary">查看歷史</button><span class="hex">underline on hover</span></div>

    <div class="tag">SIZE</div>
    <div style="display:flex; gap:10px; align-items:center"><button class="btn btn-primary btn-sm">Filter</button><button class="btn btn-primary">Filter</button><button class="btn btn-primary btn-lg">Filter</button><span class="hex">sm · md · lg</span></div>

    <div class="tag">DISABLED</div>
    <div style="display:flex; gap:10px; align-items:center"><button class="btn btn-disabled" disabled>Open report</button><span class="hex">paper-2 · #B7B6B3 text</span></div>
  </div>
</body></html>
