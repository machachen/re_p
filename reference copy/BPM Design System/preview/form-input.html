<!DOCTYPE html>
<!-- @dsCard group="Components" name="Form inputs" subtitle="Field, select, checkbox · bilingual labels" viewport="700x320" -->
<html lang="en"><head><meta charset="utf-8"><title>Form inputs</title><link rel="stylesheet" href="_card.css">
<style>
  .field { display:flex; flex-direction:column; gap:6px; }
  .field label { font-family:var(--font-sans); font-size:11px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:#5C5C61; }
  .field input, .field select { font-family:var(--font-sans); font-size:14px; padding:9px 12px; background:#FBF8F2; border:1px solid #D8D5CE; border-radius:2px; color:#0B0B0C; }
  .field input:focus { outline:none; border-color:#0B0B0C; }
  .field input::placeholder { color:#8E8E96; }
  .input-error { border-color:#8E1B1F !important; }
  .help { font-family:var(--font-sans); font-size:11px; color:#5C5C61; }
  .help-err { color:#8E1B1F; }
</style>
</head>
<body style="padding:24px 28px">
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:18px 28px">
    <div class="field"><label>Asset name · 資產名稱</label><input value="信義 A18 商辦"></div>
    <div class="field"><label>Acquisition price (NT$)</label><input value="1,284,500,000" style="font-variant-numeric:tabular-nums"></div>
    <div class="field"><label>Sector · 類別</label><select><option>Office · 商辦</option><option>Retail</option><option>Logistics</option></select></div>
    <div class="field"><label>Quarter</label><input placeholder="Select quarter"></div>
    <div class="field"><label>WALT (years)</label><input class="input-error" value="−2.4"><span class="help help-err">Value must be positive.</span></div>
    <div class="field"><label>Notes · 備註</label><input placeholder="Optional"></div>
  </div>
  <div style="margin-top:18px; display:flex; gap:10px">
    <input type="checkbox" id="ck" checked style="accent-color:#8E1B1F; width:14px; height:14px; margin:3px 0 0">
    <label for="ck" style="font-family:var(--font-sans); font-size:13px; color:#0B0B0C">Include this asset in committee pack · 納入委員會資料包</label>
  </div>
</body></html>
