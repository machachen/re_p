<!DOCTYPE html>
<!-- @dsCard group="Components" name="Top bar & page title" subtitle="Sticky header · nav · live tick · 繁中 / EN" viewport="700x180" -->
<html lang="en"><head><meta charset="utf-8"><title>Top bar</title><link rel="stylesheet" href="_card.css"></head>
<body style="padding:0; background:var(--paper)">
  <header style="height:64px; background:rgba(245,241,234,0.78); backdrop-filter:saturate(180%) blur(12px); border-bottom:1px solid var(--rule); display:flex; align-items:center; padding:0 32px; position:relative; z-index:1">
    <!-- wordmark -->
    <div style="display:flex; align-items:baseline; gap:8px">
      <span style="font-family:Inter,system-ui,sans-serif; font-weight:800; font-size:24px; letter-spacing:-0.04em; color:var(--ink); line-height:1">BPM</span>
      <span style="display:inline-block; width:0; height:0; border-left:4px solid transparent; border-right:4px solid transparent; border-bottom:6px solid #8E1B1F; margin-left:-2px; transform:translateY(-6px)"></span>
      <span style="font-family:var(--font-sans); font-size:10px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--ink-3); margin-left:6px">Portfolio Intelligence</span>
    </div>
    <!-- nav -->
    <nav style="margin-left:48px; display:flex; gap:24px; font-family:var(--font-sans); font-size:13px">
      <a style="border:0; color:var(--ink); font-weight:500; padding-bottom:22px; border-bottom:2px solid var(--ink); margin-bottom:-23px">Portfolio</a>
      <a style="border:0; color:var(--ink-3)">Assets</a>
      <a style="border:0; color:var(--ink-3)">Scenarios</a>
      <a style="border:0; color:var(--ink-3)">Reports · 報告</a>
    </nav>
    <!-- right cluster -->
    <div style="margin-left:auto; display:flex; align-items:center; gap:14px; font-family:var(--font-sans); font-size:13px; color:var(--ink-3)">
      <span style="display:inline-flex; align-items:center; gap:6px"><span style="width:6px; height:6px; background:#8E1B1F; border-radius:999px"></span>Live · 2025-06-30 14:02 TPE</span>
      <span style="width:1px; height:18px; background:var(--rule)"></span>
      <span>EN / 繁中</span>
      <span style="width:28px; height:28px; border-radius:999px; background:#0B0B0C; color:#F5F1EA; display:inline-flex; align-items:center; justify-content:center; font-family:var(--font-serif); font-size:13px">林</span>
    </div>
  </header>
  <div style="padding:18px 32px; background:var(--paper)">
    <div class="tag" style="margin-bottom:8px">PAGE TITLE</div>
    <div style="font-family:var(--font-cjk-serif); font-size:32px; font-weight:500; line-height:1.1">全球商辦組合 · Q2 2025</div>
    <div style="font-family:var(--font-serif); font-style:italic; font-size:16px; color:var(--ink-3); margin-top:4px">Global office portfolio · twenty-three exposures</div>
  </div>
</body></html>
