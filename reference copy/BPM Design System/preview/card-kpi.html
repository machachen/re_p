<!DOCTYPE html>
<!-- @dsCard group="Components" name="KPI strip" subtitle="Four-up KPI band as used on the dashboard" viewport="700x180" -->
<html lang="en"><head><meta charset="utf-8"><title>KPI cards</title><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px">
  <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:0; border:1px solid var(--rule); background:var(--bone)">
    <div style="padding:18px 20px; border-right:1px solid var(--rule)">
      <div class="tag">GROSS MARK · 估值</div>
      <div style="font-family:var(--font-display); font-size:40px; font-weight:500; letter-spacing:-0.022em; margin-top:8px; line-height:1; font-feature-settings:'tnum' 1">NT$24.8<span style="font-size:0.5em; color:var(--ink-3)">bn</span></div>
      <div style="margin-top:6px; font-family:var(--font-sans); font-size:12px"><span style="color:#1F5C4A; font-weight:500">▲ +0.42%</span> <span style="color:var(--ink-3)">QoQ</span></div>
    </div>
    <div style="padding:18px 20px; border-right:1px solid var(--rule)">
      <div class="tag">CAP RATE · 資本化率</div>
      <div style="font-family:var(--font-display); font-size:40px; font-weight:500; letter-spacing:-0.022em; margin-top:8px; line-height:1; font-feature-settings:'tnum' 1">3.82<span style="font-size:0.5em; color:var(--ink-3)">%</span></div>
      <div style="margin-top:6px; font-family:var(--font-sans); font-size:12px"><span style="color:#8E1B1F; font-weight:500">▼ −38 bps</span> <span style="color:var(--ink-3)">vs benchmark</span></div>
    </div>
    <div style="padding:18px 20px; border-right:1px solid var(--rule)">
      <div class="tag">WALT</div>
      <div style="font-family:var(--font-display); font-size:40px; font-weight:500; letter-spacing:-0.022em; margin-top:8px; line-height:1; font-feature-settings:'tnum' 1">4.6<span style="font-size:0.5em; color:var(--ink-3)"> yrs</span></div>
      <div style="margin-top:6px; font-family:var(--font-sans); font-size:12px"><span style="color:var(--ink-3)">range 2.1 — 8.4</span></div>
    </div>
    <div style="padding:18px 20px">
      <div class="tag">EXPOSURES · 23 檔</div>
      <div style="font-family:var(--font-display); font-size:40px; font-weight:500; letter-spacing:-0.022em; margin-top:8px; line-height:1; font-feature-settings:'tnum' 1">11<span style="font-size:0.5em; color:var(--ink-3)"> changed</span></div>
      <div style="margin-top:6px; font-family:var(--font-sans); font-size:12px"><span style="color:var(--ink-3)">since last review · 2025-04-30</span></div>
    </div>
  </div>
</body></html>
