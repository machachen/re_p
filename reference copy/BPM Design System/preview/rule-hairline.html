<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Hairlines & rules" subtitle="1 px hairline is the most-repeated element" viewport="700x300" -->
<html lang="en"><head><meta charset="utf-8"><title>Hairlines</title><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px">
  <div class="tag" style="margin-bottom:14px">RULES & HAIRLINES · 線</div>
  <div style="display:flex; flex-direction:column; gap:18px">
    <div>
      <hr style="height:1px; background:#D8D5CE; border:0; margin:0">
      <div style="display:flex; justify-content:space-between; margin-top:6px"><span class="hex">1px · rule (#D8D5CE)</span><span class="hex">cards, table rows, content well</span></div>
    </div>
    <div>
      <hr style="height:1px; background:#B7B2A6; border:0; margin:0">
      <div style="display:flex; justify-content:space-between; margin-top:6px"><span class="hex">1px · rule-2 (#B7B2A6)</span><span class="hex">table totals row</span></div>
    </div>
    <div>
      <hr style="height:2px; background:#0B0B0C; border:0; margin:0">
      <div style="display:flex; justify-content:space-between; margin-top:6px"><span class="hex">2px · ink emphasis</span><span class="hex">chart axes, report cover top</span></div>
    </div>
    <div>
      <hr style="height:2px; background:#8E1B1F; border:0; margin:0">
      <div style="display:flex; justify-content:space-between; margin-top:6px"><span class="hex">2px · BPM red</span><span class="hex">section dividers in deck only</span></div>
    </div>
    <div style="display:grid; grid-template-columns:repeat(8,1fr); height:48px; background:linear-gradient(to right, #D8D5CE 1px, transparent 1px) 0 0/24px 24px, linear-gradient(to bottom, #D8D5CE 1px, transparent 1px) 0 0/24px 24px; background-color:var(--bone); opacity:0.9"></div>
    <div style="display:flex; justify-content:space-between; margin-top:-12px"><span class="hex">0.5px · engineering grid (24px)</span><span class="hex">data-heavy screens · 30% opacity</span></div>
  </div>
</body></html>
