<!DOCTYPE html>
<!-- @dsCard group="Components" name="Chips & deltas" subtitle="Status pills · tags · gain/loss triangles" viewport="700x280" -->
<html lang="en"><head><meta charset="utf-8"><title>Status chips</title><link rel="stylesheet" href="_card.css">
<style>
  .chip { font-family:var(--font-sans); font-size:11px; font-weight:500; padding:3px 10px; border-radius:999px; border:1px solid var(--rule); background:var(--bone); color:var(--ink-2); display:inline-flex; align-items:center; gap:6px; line-height:1.4; }
  .dot { width:6px; height:6px; border-radius:999px; }
</style>
</head>
<body style="padding:24px 28px">
  <div class="tag" style="margin-bottom:12px">STATUS · 狀態標籤</div>
  <div style="display:flex; flex-wrap:wrap; gap:8px 10px">
    <span class="chip"><span class="dot" style="background:#1F5C4A"></span>Leased · 92%</span>
    <span class="chip"><span class="dot" style="background:#B5832A"></span>Under review</span>
    <span class="chip"><span class="dot" style="background:#8E1B1F"></span>Below WALT</span>
    <span class="chip"><span class="dot" style="background:#33547A"></span>Peer-tracked</span>
    <span class="chip"><span class="dot" style="background:#0B0B0C"></span>Held to maturity</span>
    <span class="chip" style="background:#0B0B0C; color:#F5F1EA; border-color:#0B0B0C">Confidential · 機密</span>
    <span class="chip" style="background:#8E1B1F; color:#F5F1EA; border-color:#8E1B1F">Live</span>
  </div>

  <div class="tag" style="margin-top:18px; margin-bottom:12px">TAGS · 分類</div>
  <div style="display:flex; flex-wrap:wrap; gap:8px 10px">
    <span class="chip" style="border-radius:2px">商辦 · Office</span>
    <span class="chip" style="border-radius:2px">Retail</span>
    <span class="chip" style="border-radius:2px">Logistics</span>
    <span class="chip" style="border-radius:2px">Hospitality</span>
    <span class="chip" style="border-radius:2px">Greater Taipei</span>
    <span class="chip" style="border-radius:2px">HKG · Central</span>
    <span class="chip" style="border-radius:2px">SGP · CBD</span>
  </div>

  <div class="tag" style="margin-top:18px; margin-bottom:12px">DELTA · 漲跌</div>
  <div style="display:flex; flex-wrap:wrap; gap:8px 12px; font-family:var(--font-sans); font-feature-settings:'tnum' 1">
    <span style="color:#1F5C4A; font-weight:500">▲ +0.42%</span>
    <span style="color:#1F5C4A; font-weight:500">▲ +38 bps</span>
    <span style="color:#8E1B1F; font-weight:500">▼ −1.42%</span>
    <span style="color:#8E1B1F; font-weight:500">▼ −68 bps</span>
    <span style="color:#5C5C61; font-weight:500">— flat</span>
  </div>
</body></html>
