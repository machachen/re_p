<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4 px base · 10 steps" viewport="700x340" -->
<html lang="en"><head><meta charset="utf-8"><title>Spacing scale</title><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px">
  <div class="tag" style="margin-bottom:14px">4 PX BASE GRID · 間距</div>
  <div style="display:flex; flex-direction:column; gap:8px">
    <div style="display:grid; grid-template-columns:60px 1fr auto; gap:14px; align-items:center"><span class="hex">s-1 · 4</span><span style="height:8px; background:#8E1B1F; width:4px"></span><span class="hex">tight icon gap</span></div>
    <div style="display:grid; grid-template-columns:60px 1fr auto; gap:14px; align-items:center"><span class="hex">s-2 · 8</span><span style="height:8px; background:#8E1B1F; width:8px"></span><span class="hex">label ↔ value</span></div>
    <div style="display:grid; grid-template-columns:60px 1fr auto; gap:14px; align-items:center"><span class="hex">s-3 · 12</span><span style="height:8px; background:#8E1B1F; width:12px"></span><span class="hex">field padding</span></div>
    <div style="display:grid; grid-template-columns:60px 1fr auto; gap:14px; align-items:center"><span class="hex">s-4 · 16</span><span style="height:8px; background:#8E1B1F; width:16px"></span><span class="hex">card inner</span></div>
    <div style="display:grid; grid-template-columns:60px 1fr auto; gap:14px; align-items:center"><span class="hex">s-5 · 24</span><span style="height:8px; background:#8E1B1F; width:24px"></span><span class="hex">block stack</span></div>
    <div style="display:grid; grid-template-columns:60px 1fr auto; gap:14px; align-items:center"><span class="hex">s-6 · 32</span><span style="height:8px; background:#8E1B1F; width:32px"></span><span class="hex">section gap</span></div>
    <div style="display:grid; grid-template-columns:60px 1fr auto; gap:14px; align-items:center"><span class="hex">s-7 · 48</span><span style="height:8px; background:#8E1B1F; width:48px"></span><span class="hex">column gutter</span></div>
    <div style="display:grid; grid-template-columns:60px 1fr auto; gap:14px; align-items:center"><span class="hex">s-8 · 64</span><span style="height:8px; background:#8E1B1F; width:64px"></span><span class="hex">page gutter</span></div>
    <div style="display:grid; grid-template-columns:60px 1fr auto; gap:14px; align-items:center"><span class="hex">s-9 · 96</span><span style="height:8px; background:#8E1B1F; width:96px"></span><span class="hex">hero margin</span></div>
    <div style="display:grid; grid-template-columns:60px 1fr auto; gap:14px; align-items:center"><span class="hex">s-10 · 128</span><span style="height:8px; background:#8E1B1F; width:128px"></span><span class="hex">deck section</span></div>
  </div>
</body></html>
