<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Iconography" subtitle="Lucide outline · 1.5 px on 24 px" viewport="700x340" -->
<html lang="en"><head><meta charset="utf-8"><title>Iconography</title><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>
  .icon-cell { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; padding:14px 6px; border:1px solid var(--rule); background:var(--bone); }
  .icon-cell svg { width:24px; height:24px; stroke:#0B0B0C; stroke-width:1.5; fill:none; }
  .icon-cell span { font-family:var(--font-mono); font-size:10px; color:var(--ink-3); }
</style>
</head>
<body style="padding:24px 28px">
  <div style="display:flex; align-items:baseline; gap:10px; margin-bottom:10px">
    <div class="tag">ICONOGRAPHY</div>
    <div class="hex">Lucide · outline · 1.5px on 24px</div>
  </div>
  <div style="display:grid; grid-template-columns:repeat(10, 1fr); gap:0; border-top:1px solid var(--rule); border-left:1px solid var(--rule)">
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="building-2"></i><span>building</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="map"></i><span>map</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="layout-grid"></i><span>portfolio</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="trending-up"></i><span>perf</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="trending-down"></i><span>drawdown</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="line-chart"></i><span>chart</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="file-text"></i><span>report</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="calendar"></i><span>quarter</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="users"></i><span>tenant</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="key-round"></i><span>lease</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="banknote"></i><span>NOI</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="scale"></i><span>balance</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="globe-2"></i><span>geo</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="filter"></i><span>filter</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="search"></i><span>search</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="download"></i><span>export</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="bell"></i><span>alert</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="lock"></i><span>confidential</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="settings"></i><span>settings</span></div>
    <div class="icon-cell" style="border-top:0; border-left:0"><i data-lucide="chevron-right"></i><span>nav</span></div>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
