<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Motion & easing" subtitle="Single ease, 120 / 200 / 360 / 400 ms" viewport="700x220" -->
<html lang="en"><head><meta charset="utf-8"><title>Motion</title><link rel="stylesheet" href="_card.css">
<style>
  @keyframes drift { 0% { transform:translateX(0)} 50% { transform:translateX(160px)} 100% { transform:translateX(0)} }
  .ease  { animation:drift 3.6s cubic-bezier(0.22, 0.61, 0.36, 1) infinite; }
</style>
</head>
<body style="padding:24px 28px">
  <div class="tag" style="margin-bottom:14px">EASING · 緩動</div>
  <div style="display:flex; gap:24px; align-items:flex-start">
    <div style="flex:1">
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3); margin-bottom:6px">cubic-bezier(0.22, 0.61, 0.36, 1)</div>
      <svg viewBox="0 0 200 100" width="200" height="100" style="display:block; border:1px solid var(--rule); background:var(--bone)">
        <line x1="0" y1="100" x2="200" y2="100" stroke="#D8D5CE"/>
        <line x1="0" y1="0"   x2="0"   y2="100" stroke="#D8D5CE"/>
        <path d="M0 100 C 44 39, 72 0, 200 0" fill="none" stroke="#8E1B1F" stroke-width="1.5"/>
      </svg>
    </div>
    <div style="flex:1.4">
      <div style="display:flex; flex-direction:column; gap:8px; font-family:var(--font-mono); font-size:11px; color:var(--ink-2)">
        <div style="display:flex; justify-content:space-between"><span>--d-hover</span><span>120ms</span><span class="hex">button colour shift</span></div>
        <div style="display:flex; justify-content:space-between"><span>--d-component</span><span>200ms</span><span class="hex">menu open · drawer slide</span></div>
        <div style="display:flex; justify-content:space-between"><span>--d-route</span><span>360ms</span><span class="hex">page fade</span></div>
        <div style="display:flex; justify-content:space-between"><span>--d-chart</span><span>400ms</span><span class="hex">chart draw-in</span></div>
      </div>
      <div style="margin-top:14px; height:24px; background:var(--bone); border:1px solid var(--rule); overflow:hidden; position:relative">
        <div class="ease" style="width:24px; height:22px; background:#8E1B1F; position:absolute; top:1px; left:1px"></div>
      </div>
      <div class="hex" style="margin-top:4px">No bounce. No spring. No scale shrink.</div>
    </div>
  </div>
</body></html>
