<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Neutral scale" subtitle="11-step graphite + warm paper tints" viewport="700x280" -->
<html lang="en"><head><meta charset="utf-8"><title>Neutrals</title><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px">
  <div class="tag" style="margin-bottom:10px">GRAPHITE · 中性灰階</div>
  <div style="display:grid; grid-template-columns:repeat(11, 1fr); gap:0; border:1px solid var(--rule)">
    <div style="background:#FFFFFF; height:88px; padding:8px; font-family:var(--font-mono); font-size:9px; color:var(--ink-3); display:flex; flex-direction:column; justify-content:space-between"><span>white</span><span>#FFFFFF</span></div>
    <div style="background:#F2F2F3; height:88px; padding:8px; font-family:var(--font-mono); font-size:9px; color:var(--ink-3); display:flex; flex-direction:column; justify-content:space-between"><span>50</span><span>#F2F2F3</span></div>
    <div style="background:#E5E5E7; height:88px; padding:8px; font-family:var(--font-mono); font-size:9px; color:var(--ink-3); display:flex; flex-direction:column; justify-content:space-between"><span>100</span><span>#E5E5E7</span></div>
    <div style="background:#D2D2D6; height:88px; padding:8px; font-family:var(--font-mono); font-size:9px; color:var(--ink-3); display:flex; flex-direction:column; justify-content:space-between"><span>200</span><span>#D2D2D6</span></div>
    <div style="background:#B6B6BC; height:88px; padding:8px; font-family:var(--font-mono); font-size:9px; color:var(--ink); display:flex; flex-direction:column; justify-content:space-between"><span>300</span><span>#B6B6BC</span></div>
    <div style="background:#8E8E96; height:88px; padding:8px; font-family:var(--font-mono); font-size:9px; color:#F5F1EA; display:flex; flex-direction:column; justify-content:space-between"><span>400</span><span>#8E8E96</span></div>
    <div style="background:#6A6A71; height:88px; padding:8px; font-family:var(--font-mono); font-size:9px; color:#F5F1EA; display:flex; flex-direction:column; justify-content:space-between"><span>500</span><span>#6A6A71</span></div>
    <div style="background:#4E4E54; height:88px; padding:8px; font-family:var(--font-mono); font-size:9px; color:#F5F1EA; display:flex; flex-direction:column; justify-content:space-between"><span>600</span><span>#4E4E54</span></div>
    <div style="background:#38383D; height:88px; padding:8px; font-family:var(--font-mono); font-size:9px; color:#F5F1EA; display:flex; flex-direction:column; justify-content:space-between"><span>700</span><span>#38383D</span></div>
    <div style="background:#232327; height:88px; padding:8px; font-family:var(--font-mono); font-size:9px; color:#F5F1EA; display:flex; flex-direction:column; justify-content:space-between"><span>800</span><span>#232327</span></div>
    <div style="background:#0B0B0C; height:88px; padding:8px; font-family:var(--font-mono); font-size:9px; color:#F5F1EA; display:flex; flex-direction:column; justify-content:space-between"><span>950</span><span>#0B0B0C</span></div>
  </div>

  <div class="tag" style="margin-top:18px; margin-bottom:10px">WARM PAPERS · 紙色</div>
  <div style="display:grid; grid-template-columns:repeat(5, 1fr); border:1px solid var(--rule)">
    <div style="background:#FBF8F2; height:62px; padding:8px; font-family:var(--font-mono); font-size:9px; color:var(--ink-3); display:flex; flex-direction:column; justify-content:space-between"><span>bone</span><span>#FBF8F2</span></div>
    <div style="background:#F5F1EA; height:62px; padding:8px; font-family:var(--font-mono); font-size:9px; color:var(--ink-3); display:flex; flex-direction:column; justify-content:space-between"><span>paper</span><span>#F5F1EA</span></div>
    <div style="background:#ECE7DD; height:62px; padding:8px; font-family:var(--font-mono); font-size:9px; color:var(--ink-3); display:flex; flex-direction:column; justify-content:space-between"><span>paper-2</span><span>#ECE7DD</span></div>
    <div style="background:#E2DCCE; height:62px; padding:8px; font-family:var(--font-mono); font-size:9px; color:var(--ink-3); display:flex; flex-direction:column; justify-content:space-between"><span>paper-3</span><span>#E2DCCE</span></div>
    <div style="background:#D8D5CE; height:62px; padding:8px; font-family:var(--font-mono); font-size:9px; color:var(--ink-3); display:flex; flex-direction:column; justify-content:space-between"><span>rule</span><span>#D8D5CE</span></div>
  </div>
</body></html>
