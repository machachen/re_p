<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Brand colors" subtitle="BPM red · oxblood · ink · paper" viewport="700x230" -->
<html lang="en"><head><meta charset="utf-8"><title>Brand colors</title><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px">
  <div class="card-row" style="gap:0; border:1px solid var(--rule); background:var(--bone)">
    <div style="flex:1.4; background:#8E1B1F; height:170px; position:relative; padding:14px 16px; color:#F5F1EA">
      <div class="tag" style="color:rgba(245,241,234,0.7)">PRIMARY · 主色</div>
      <div style="position:absolute; left:16px; bottom:14px">
        <div style="font-family:var(--font-serif); font-size:26px; font-weight:500; letter-spacing:-0.01em">BPM Red</div>
        <div style="font-family:var(--font-mono); font-size:11px; opacity:0.8; margin-top:2px">#8E1B1F · oklch(0.41 0.14 24)</div>
      </div>
    </div>
    <div style="flex:1; background:#5E1115; height:170px; padding:14px 16px; color:#F5F1EA; position:relative">
      <div class="tag" style="color:rgba(245,241,234,0.7)">PRESS · OXBLOOD</div>
      <div style="position:absolute; left:16px; bottom:14px">
        <div style="font-family:var(--font-serif); font-size:20px; font-weight:500">Oxblood</div>
        <div style="font-family:var(--font-mono); font-size:11px; opacity:0.8; margin-top:2px">#5E1115</div>
      </div>
    </div>
    <div style="flex:1; background:#0B0B0C; height:170px; padding:14px 16px; color:#F5F1EA; position:relative">
      <div class="tag" style="color:rgba(245,241,234,0.7)">INK</div>
      <div style="position:absolute; left:16px; bottom:14px">
        <div style="font-family:var(--font-serif); font-size:20px; font-weight:500">Ink</div>
        <div style="font-family:var(--font-mono); font-size:11px; opacity:0.8; margin-top:2px">#0B0B0C</div>
      </div>
    </div>
    <div style="flex:1; background:#F5F1EA; height:170px; padding:14px 16px; color:#0B0B0C; position:relative; border-left:1px solid var(--rule)">
      <div class="tag">PAPER</div>
      <div style="position:absolute; left:16px; bottom:14px">
        <div style="font-family:var(--font-serif); font-size:20px; font-weight:500">Paper</div>
        <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3); margin-top:2px">#F5F1EA</div>
      </div>
    </div>
  </div>
  <div style="margin-top:10px; display:flex; gap:10px; align-items:center">
    <div style="font-family:var(--font-serif); font-size:13px; font-style:italic; color:var(--ink-3)">One red per screen.</div>
    <div style="flex:1; height:1px; background:var(--rule)"></div>
    <div class="tag">RULE</div>
  </div>
</body></html>
